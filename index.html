<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>快穿·万人迷｜异世界旅人手札 v4.3</title>
    <style>
        :root {
            --bg-body: #ffffff;
            --bg-panel: #ffffff;
            --bg-side: #fafafa;
            --text-primary: #111111;
            --text-secondary: #555555;
            --border-light: #e0e0e0;
            --border-medium: #cccccc;
            --accent: #111111;
            --accent-bg: #eeeeee;
            --card-shadow: none;
            --header-border: #333333;
            --star-color: #d4af37;
            --choice-result-color: #a0a0a0;
        }
        
        body.theme-blackwhite {
            --bg-body: #ffffff;
            --bg-panel: #ffffff;
            --bg-side: #fafafa;
            --text-primary: #111111;
            --text-secondary: #555555;
            --border-light: #e0e0e0;
            --border-medium: #cccccc;
            --accent: #111111;
            --accent-bg: #eeeeee;
            --card-shadow: none;
            --header-border: #333333;
        }
        
        body.theme-morandi_blue {
            --bg-body: #eef2f7;
            --bg-panel: #ffffff;
            --bg-side: #f5f8fc;
            --text-primary: #2c3e50;
            --text-secondary: #6f8aa3;
            --border-light: #d2dfed;
            --border-medium: #bccde0;
            --accent: #5f8ab6;
            --accent-bg: #dee8f2;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.03);
            --header-border: #5f8ab6;
        }
        
        body.theme-burgundy {
            --bg-body: #faf5f5;
            --bg-panel: #fffcfc;
            --bg-side: #fdf8f8;
            --text-primary: #4a2a2a;
            --text-secondary: #8b5a5a;
            --border-light: #e8d0d0;
            --border-medium: #d4b0b0;
            --accent: #8b3a3a;
            --accent-bg: #f0e0e0;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.03);
            --header-border: #8b3a3a;
        }
        
        body.theme-morandi_apricot {
            --bg-body: #f9f2e0;
            --bg-panel: #fffcf5;
            --bg-side: #fef7e8;
            --text-primary: #5e4b3a;
            --text-secondary: #b2906e;
            --border-light: #f0e0c8;
            --border-medium: #e2cdad;
            --accent: #cb8b42;
            --accent-bg: #f5e5d2;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.03);
            --header-border: #cb8b42;
        }
        
        body.theme-morandi_sage {
            --bg-body: #eef2ea;
            --bg-panel: #fefef7;
            --bg-side: #f8faf2;
            --text-primary: #3c4935;
            --text-secondary: #7c8b6b;
            --border-light: #d9e2ce;
            --border-medium: #c5d2b4;
            --accent: #7c9c5e;
            --accent-bg: #e1ecce;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.03);
            --header-border: #7c9c5e;
        }
        
        body.night-mode {
            --bg-body: #121212;
            --bg-panel: #1e1e1e;
            --bg-side: #252525;
            --text-primary: #f0f0f0;
            --text-secondary: #c0c0c0;
            --border-light: #3a3a3a;
            --border-medium: #555555;
            --accent: #aaaaaa;
            --accent-bg: #3a3a3a;
            --card-shadow: 0 2px 8px rgba(0,0,0,0.5);
            --header-border: #aaaaaa;
            --star-color: #f0c674;
            --choice-result-color: #888888;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-body); 
            font-family: 'Segoe UI', 'Georgia', serif; 
            color: var(--text-primary); 
            line-height: 1.6; 
            padding: 1rem;
            transition: background 0.2s, color 0.2s;
        }
        
        /* 所有圆角改为4px */
        .game-header {
            text-align: center;
            margin-bottom: 1.2rem;
            padding: 0.5rem 0 0.2rem;
            border-bottom: 1px solid var(--border-light);
        }
        .game-header h1 {
            font-size: 1.9rem;
            letter-spacing: 2px;
            font-weight: 400;
            font-family: 'Georgia', 'Segoe UI', serif;
            color: var(--text-primary);
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            text-overflow: clip;
            display: inline-block;
            max-width: 100%;
            padding: 0 0.2rem;
        }
        @media (max-width: 550px) {
            .game-header h1 { font-size: 1.5rem; letter-spacing: 1px; }
        }
        .header-divider {
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            opacity: 0.7;
        }
        
        .game-container { max-width: 1400px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 1.5rem; }
        .main-panel { flex: 2.5; min-width: 280px; background: var(--bg-panel); border: 1px solid var(--border-light); padding: 1.2rem; border-radius: 4px; box-shadow: var(--card-shadow); }
        .side-panel { flex: 1.5; min-width: 280px; display: flex; flex-direction: column; gap: 1.2rem; }
        .status-card, .character-card-section { background: var(--bg-side); border: 1px solid var(--border-light); padding: 1rem; border-radius: 4px; box-shadow: var(--card-shadow); }
        .status-label { font-size: 0.7rem; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 0.4rem; border-bottom: 1px solid var(--border-medium); display: inline-block; }
        .character-grid { display: flex; flex-direction: column; gap: 0.8rem; max-height: 500px; overflow-y: auto; }
        .character-card { background: var(--bg-panel); border: 1px solid var(--border-light); padding: 0.6rem; border-radius: 4px; display: flex; align-items: center; gap: 0.8rem; }
        .char-avatar { width: 40px; height: 40px; background: var(--accent-bg); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .char-info { flex: 1; }
        .char-name { font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .star { color: var(--star-color); font-size: 0.8rem; }
        .char-type { font-size: 0.7rem; color: var(--text-secondary); }
        .char-favor { font-size: 0.75rem; margin-top: 2px; }
        .char-desc { font-size: 0.7rem; color: var(--text-secondary); }
        .round-header { border-left: 3px solid var(--header-border); padding-left: 0.8rem; margin-bottom: 1rem; font-size: 0.8rem; color: var(--text-secondary); }
        .narrative { font-size: 0.9rem; line-height: 1.65; white-space: pre-wrap; }
        .narrative .message-block { margin-bottom: 1.2rem; border-bottom: 1px solid var(--border-light); padding-bottom: 0.6rem; }
        .narrative .choice-result { 
            color: var(--choice-result-color); 
            font-style: italic; 
            font-size: 0.85rem; 
            margin: 0.3rem 0;
        }
        .narrative-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.4rem; max-width: 300px; margin-top: 0.3rem; }
        .narrative-actions button, .narrative-actions .timer { text-align: center; padding: 0.2rem; font-size: 0.7rem; background: var(--accent-bg); border: 1px solid var(--border-medium); border-radius: 4px; cursor: pointer; color: var(--text-primary); }
        .narrative-actions .timer { background: transparent; cursor: default; }
        .control-bar { margin-top: 1.5rem; display: grid; gap: 0.5rem; grid-template-columns: repeat(7, minmax(0, 1fr)); }
        @media (max-width: 900px) { .control-bar { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
        @media (max-width: 600px) { .control-bar { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
        .control-bar button { padding: 0.3rem; font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: var(--bg-panel); border: 1px solid var(--border-medium); color: var(--text-primary); cursor: pointer; border-radius: 4px; }
        .control-bar button.primary-btn { background: var(--accent); color: white; border-color: var(--accent); }
        .cmd-input-area { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .cmd-input { flex: 3; background: var(--bg-panel); border: 1px solid var(--border-medium); padding: 0.4rem; font-family: monospace; color: var(--text-primary); border-radius: 4px; }
        .options-area { margin-top: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
        .options-area select { max-width: 100%; word-wrap: break-word; white-space: normal; padding: 0.4rem; border-radius: 4px; background: var(--bg-panel); border: 1px solid var(--border-medium); color: var(--text-primary); }
        .options-area select option { white-space: normal; word-wrap: break-word; padding: 0.3rem; }
        .api-config input, .api-config select { width: 100%; padding: 0.3rem; margin: 0.2rem 0; border: 1px solid var(--border-medium); background: var(--bg-panel); color: var(--text-primary); border-radius: 4px; }
        .model-row { display: flex; gap: 4px; align-items: center; }
        .model-row select { flex: 2; }
        .model-row button { flex: 1; font-size: 0.7rem; padding: 0.2rem; }
        .style-select-full { width: 100%; margin: 0.3rem 0; }
        .style-select-full select, .style-select-full input { width: 100%; padding: 0.4rem; border: 1px solid var(--border-medium); border-radius: 4px; background: var(--bg-panel); color: var(--text-primary); font-size: 0.75rem; }
        .custom-hint { font-size: 0.65rem; color: var(--text-secondary); margin-top: 0.2rem; margin-bottom: 0.3rem; }
        .nsfw-force-select { width: 100%; margin: 0.3rem 0; padding: 0.4rem; border: 1px solid var(--border-medium); border-radius: 4px; background: var(--bg-panel); color: var(--text-primary); font-size: 0.75rem; white-space: normal; word-wrap: break-word; }
        .api-buttons { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem; }
        .api-buttons button { width: 100%; padding: 0.4rem; font-size: 0.75rem; background: var(--bg-panel); border: 1px solid var(--border-medium); color: var(--text-primary); border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--bg-panel); border: 1px solid var(--border-medium); max-width: 550px; width: 90%; padding: 1.2rem; border-radius: 4px; max-height: 80vh; overflow-y: auto; color: var(--text-primary); }
        .flex-btns { display: flex; gap: 0.8rem; justify-content: flex-end; margin-top: 1rem; }
        .theme-selector, .mode-selector { display: inline-flex; gap: 0.5rem; align-items: center; }
        .generating-placeholder { color: var(--text-secondary); font-style: italic; padding: 0.5rem; }
        .generating-placeholder .cancel-btn { margin-top: 0.5rem; }
        .form-group { margin-bottom: 0.6rem; }
        .form-group label { display: block; font-size: 0.75rem; margin-bottom: 0.2rem; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.5rem; border: 1px solid var(--border-medium); border-radius: 4px; background: var(--bg-panel); color: var(--text-primary); font-size: 0.8rem; }
        .hint { font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.2rem; }
        .summary-text { background: var(--bg-side); padding: 0.8rem; white-space: pre-wrap; font-size: 0.8rem; max-height: 300px; overflow-y: auto; color: var(--text-primary); border-radius: 4px; }
        button { cursor: pointer; }
        button.primary-btn { background: var(--accent); color: white; border-color: var(--accent); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .save-settings-btn { width: 100%; margin-top: 0.8rem; background: var(--accent); color: white; border-color: var(--accent); border-radius: 4px; padding: 0.4rem; }
        .check-settings-btn { width: 100%; margin-top: 0.5rem; background: var(--bg-panel); border: 1px solid var(--border-medium); color: var(--text-primary); border-radius: 4px; padding: 0.4rem; }
    </style>
</head>
<body>
<div class="game-header">
    <h1>异世界旅人手札</h1>
    <div class="header-divider">——♢——</div>
</div>

<div class="game-container">
    <div class="main-panel">
        <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.8rem;">
            <div class="theme-selector"><label>◈ 主题</label><select id="colorThemeSelect">
                <option value="blackwhite">◐ 黑白</option>
                <option value="morandi_blue">〰 雾霾蓝</option>
                <option value="burgundy">⌇ 勃艮第红</option>
                <option value="morandi_apricot">◇ 杏色</option>
                <option value="morandi_sage">▣ 鼠尾草绿</option>
            </select></div>
            <div class="mode-selector"><label>☾ 日夜</label><select id="nightModeSelect"><option value="day">☀ 日间</option><option value="night">☽ 夜间</option></select></div>
        </div>
        <div id="roundHeader" class="round-header"><p>☾ 时间：——</p><p>☾ 地点：——</p><p>☾ 在场人物：——</p></div>
        <div id="narrativeText" class="narrative">◇ 快穿·万人迷 ◇<br><br>请先完成设定表格开始游戏。</div>
        <div class="control-bar">
            <button id="nextRoundBtn" class="primary-btn">▷下一回合</button>
            <button id="initWorldBtn">◈初始化</button>
            <button id="saveGameBtn">⎚存档</button>
            <button id="loadGameBtn">☷读档</button>
            <button id="resetWorldBtn">◉重置</button>
            <button id="summaryBtn">☰总结</button>
            <button id="endWorldBtn">↻结束</button>
        </div>
        <div id="optionsContainer" class="options-area"></div>
        <div class="cmd-input-area"><input type="text" id="userCommand" placeholder="输入选项代号或剧情要求"><button id="sendCmdBtn">↲执行</button></div>
    </div>
    <div class="side-panel">
        <div class="status-card"><div class="status-label">◈当前世界</div><div id="worldName">未初始化</div><div class="status-label">◈回合</div><div id="turnInfo">第0回合</div><div class="status-label">◈旅者</div><div id="heroineInfo">未设定</div><hr>
            <div class="status-label">⌘ NSFW风格</div>
            <div class="style-select-full"><select id="nsfwStyleSelect"><option value="euphemism">〰 意识流简略</option><option value="explicit">⌇ 详细直白</option></select></div>
            <div class="style-select-full"><input type="text" id="nsfwCustomReq" placeholder="额外要求（如：侧重情感/温柔向）"></div>
            <div class="custom-hint">◌ 可补充NSFW偏好</div>
            <div class="status-label" style="margin-top:0.3rem;">⌁ NSFW强制控制</div>
            <select id="nsfwForceControl" class="nsfw-force-select">
                <option value="force_on">⊘ 强制开启NSFW剧情</option>
                <option value="force_off">⊗ 强制关闭NSFW剧情</option>
                <option value="auto" selected>✧ 剧情自行发展NSFW剧情（默认）</option>
            </select>
            <div class="custom-hint">◌ 强制开启：所有选项引导NSFW；强制关闭：所有选项结束NSFW</div>
            <div class="status-label" style="margin-top:0.5rem;">✍️写作风格</div>
            <div class="style-select-full"><select id="writingStyleSelect">
                <option value="default">默认风格</option>
                <option value="classical">古风典雅</option>
                <option value="modern">现代轻快</option>
                <option value="relaxed">轻松治愈</option>
                <option value="detailed">细腻描写</option>
                <option value="custom">自定义</option>
            </select></div>
            <div class="style-select-full"><input type="text" id="writingCustomReq" placeholder="写作要求或【】内模仿文本"></div>
            <div class="custom-hint">◌ 可输入风格要求</div>
            <div class="status-label" style="margin-top:0.5rem;">☯ 视角选择</div>
            <div class="style-select-full"><select id="perspectiveSelect">
                <option value="first">第一人称（我）</option>
                <option value="second" selected>第二人称（你）</option>
                <option value="third">第三人称（她/他）</option>
            </select></div>
            <div class="custom-hint">◌ 叙述用所选人称，可用姓名替代；角色对话正常使用“你”</div>
            <button id="saveSettingsBtn" class="save-settings-btn">⎚ 保存设置</button>
            <button id="checkSettingsBtn" class="check-settings-btn">⌧ 检查设置</button>
        </div>
        <div class="character-card-section"><div class="status-label">◇ 角色图鉴 ◇ <span style="font-size:0.7rem;">(★为核心角色)</span></div><div id="characterGrid">暂无角色</div></div>
        <div class="status-card api-config"><div class="status-label">⌘ API配置</div>
            <input type="text" id="apiUrl" placeholder="API地址" value="https://api.openai.com/v1/chat/completions">
            <input type="text" id="apiKey" placeholder="API Key">
            <div class="model-row"><select id="modelSelect"></select><button id="fetchModelsBtn">拉取模型</button></div>
            <div class="api-buttons">
                <button id="saveApiBtn">保存配置</button>
                <button id="viewPanelBtn">刷新面板</button>
                <button id="testApiBtn">测试API</button>
            </div>
        </div>
    </div>
</div>

<!-- 设定表格模态框 -->
<div id="setupModal" class="modal"><div class="modal-content"><h3>✧ 角色与世界观 ✧</h3>
    <div class="form-group"><label>姓名</label><input id="heroName" placeholder="随机"></div>
    <div class="form-group"><label>昵称</label><input id="heroNickname" placeholder="可选，角色亲近后可称呼"></div>
    <div class="form-group"><label>性别</label><select id="heroGender"><option>女</option><option>男</option></select></div>
    <div class="form-group"><label>年龄</label><input id="heroAge" placeholder="随机"></div>
    <div class="form-group"><label>外貌</label><input id="heroLook" placeholder="随机"></div>
    <div class="form-group"><label>性格</label><input id="heroPersonality" placeholder="可选，留空则不描写"></div>
    <div class="form-group"><label>背景</label><input id="heroBackground" placeholder="可选，留空则默认"></div>
    <div class="form-group"><label>世界观</label><select id="worldSelect">
        <option value="A">现代校园/职场</option><option value="B">古风宫廷/仙侠</option><option value="C">西幻/异世界</option><option value="D">星际/未来科幻</option>
        <option value="E">娱乐圈/偶像</option><option value="F">末日/废土</option><option value="G">推理/悬疑</option><option value="H">蒸汽朋克</option>
        <option value="I">魔法学院</option><option value="J">修真/仙侠</option><option value="K">兽人/亚人</option><option value="L">吸血鬼/狼人</option>
        <option value="other">✧ 其他（自定义）</option>
    </select></div>
    <div class="form-group"><label>世界观备注/期望</label><textarea id="worldCustom" rows="3" placeholder="补充期望"></textarea><div class="hint">◌ 可补充对世界观的期望</div></div>
    <div class="form-group"><label>⌇ 性取向</label><select id="sexualitySelect">
        <option value="male">男</option>
        <option value="female">女</option>
        <option value="both" selected>男女均可</option>
    </select></div>
    <div class="flex-btns"><button id="cancelSetupBtn">取消</button><button id="confirmSetupBtn" class="primary-btn">开始新周目</button></div>
</div></div>

<div id="nsfwModal" class="modal"><div class="modal-content"><h3>NSFW确认</h3><textarea id="nsfwRuleInput" rows="6"></textarea><div class="flex-btns"><button id="nsfwCancel">取消</button><button id="nsfwConfirm" class="primary-btn">确认生成</button></div></div></div>
<div id="saveLoadModal" class="modal"><div class="modal-content"><h3 id="modalTitle">存档管理</h3><div id="slotList"></div><button id="closeModalBtn">关闭</button></div></div>
<div id="summaryModal" class="modal"><div class="modal-content"><h3>☰ 周目总结</h3><div id="summaryContent" class="summary-text"></div><div class="flex-btns"><button id="closeSummaryBtn">关闭</button><button id="downloadSummaryBtn">下载TXT</button></div></div></div>
<script>
    // 全局状态
    let gameState = {
        world: null, worldType: null, worldCustomNote: "", turnUnit: "一天", currentTurn: 0,
        heroine: { name: "", nickname: "", personality: "", gender: "女", age: "", appearance: "", background: "", sexuality: "both" },
        characters: [], mainCharacterIds: [],
        history: [], conversationHistory: [], narrativeElements: [],
        writingStyle: "default", isWorldEnded: false, worldEndSummary: ""
    };
    
    // 时间系统全局变量
    let gameTime = {
        calendarName: "",
        year: 1000,
        month: 1,
        day: 1,
        period: "清晨",
        turnUnit: "一天"
    };
    const PERIODS = ["清晨", "上午", "中午", "下午", "傍晚", "夜晚", "深夜"];
    
    let apiSettings = { url: "", key: "", model: "" };
    let saveSlots = Array(6).fill(null).map(() => ({ name: "空槽位", data: null }));
    let isLoading = false, nextId = 1, testCooldown = false, testTimerInterval = null;
    let currentAbortController = null;
    let currentTimerInterval = null;
    let retryCount = 0;
    
    // NSFW剧情状态跟踪
    let nsfwState = {
        isActive: false,           // 是否正在进行NSFW剧情
        isAtNaturalEnd: false,     // 是否到达自然结束点
        roundsCount: 0             // NSFW持续回合数
    };
    
    // 保存玩家设置的对象
    let appliedSettings = {
        nsfwStyle: "euphemism",
        nsfwCustomReq: "",
        nsfwForceControl: "auto",
        writingStylePreset: "default",
        writingCustomReq: "",
        perspective: "second",
        worldName: "",
        heroineInfo: {},
        turnUnit: "一天"
    };

    function getTimestamp() { return new Date().toLocaleString(); }
    function clean(t) { return (t||"").replace(/[*_~`]/g, ''); }
    
    // ========== 时间系统函数 ==========
    
    function generateCalendarName(worldName) {
        if (worldName.includes("西幻") || worldName.includes("异世界") || worldName.includes("魔法")) return "塞拉历";
        if (worldName.includes("古风") || worldName.includes("仙侠") || worldName.includes("修真")) return "沧澜历";
        if (worldName.includes("现代") || worldName.includes("校园") || worldName.includes("职场") || worldName.includes("娱乐圈")) return "公元历";
        if (worldName.includes("星际") || worldName.includes("未来") || worldName.includes("科幻")) return "星历";
        if (worldName.includes("末日") || worldName.includes("废土")) return "废土历";
        if (worldName.includes("推理") || worldName.includes("悬疑")) return "现世历";
        if (worldName.includes("蒸汽朋克")) return "机械历";
        if (worldName.includes("兽人") || worldName.includes("亚人")) return "部落历";
        if (worldName.includes("吸血鬼") || worldName.includes("狼人")) return "血月历";
        return "新历";
    }
    
    function initGameTime(worldName) {
        gameTime.calendarName = generateCalendarName(worldName);
        gameTime.year = Math.floor(Math.random() * 8000) + 1000;
        gameTime.month = 1;
        gameTime.day = 1;
        gameTime.period = "清晨";
        gameTime.turnUnit = gameState.turnUnit;
    }
    
    function formatGameTime() {
        return `${gameTime.calendarName}${gameTime.year}年${gameTime.month}月${gameTime.day}日 ${gameTime.period}`;
    }
    
    function advancePeriod() {
        let currentIndex = PERIODS.indexOf(gameTime.period);
        if (currentIndex === -1) currentIndex = 0;
        let nextIndex = currentIndex + 1;
        let crossedDay = false;
        if (nextIndex >= PERIODS.length) {
            nextIndex = 0;
            crossedDay = true;
        }
        gameTime.period = PERIODS[nextIndex];
        return crossedDay;
    }
    
    function advanceDate(days) {
        for (let i = 0; i < days; i++) {
            gameTime.day++;
            if (gameTime.day > 30) {
                gameTime.day = 1;
                gameTime.month++;
                if (gameTime.month > 12) {
                    gameTime.month = 1;
                    gameTime.year++;
                }
            }
        }
    }
    
    function advanceGameTime(unit, skipDays = 0) {
        let daysToAdd = skipDays;
        if (daysToAdd === 0) {
            daysToAdd = (unit === "一周") ? 7 : 1;
        }
        let crossedDay = advancePeriod();
        if (crossedDay) {
            advanceDate(1);
            daysToAdd--;
        }
        if (daysToAdd > 0) {
            advanceDate(daysToAdd);
        }
        if (skipDays > 1 || (skipDays === 0 && unit === "一周")) {
            gameTime.period = "上午";
        }
    }
    
    function parseTimeJump(text) {
        const regex = /【时间跳跃:(\d+)天】/;
        const match = text.match(regex);
        if (match) return parseInt(match[1]);
        return 0;
    }

        const headerDiv = document.getElementById("roundHeader");
        const currentHtml = headerDiv.innerHTML;
        const lines = currentHtml.split('<br>');
        if (lines.length >= 1) {

            headerDiv.innerHTML = lines.join('<br>');

    function parseHiddenCharacterInfo(text) {
        const regex = /<!--\s*新角色:\s*姓名[：:]\s*([^,，\n]+)[,，\s]*性别[：:]\s*([^,，\n]+)[,，\s]*类型[：:]\s*([^,，\n]+)[,，\s]*简介[：:]\s*([^，\n]+)[,，\s]*好感[：:]\s*(\d+)\s*-->/gi;
        let added = false;
        for (const m of text.matchAll(regex)) {
            const name = clean(m[1]);
            const gender = clean(m[2]);
            const type = clean(m[3]);
            const desc = clean(m[4]);
            const favor = parseInt(m[5]) || 70;
            if (!gameState.characters.some(c=>c.name===name)) {
                const sexuality = gameState.heroine.sexuality || "both";
                const isMain = gameState.characters.length < 6;
                let shouldInclude = true;
                if (sexuality === "male" && isMain && gender !== "男") shouldInclude = false;
                if (sexuality === "female" && isMain && gender !== "女") shouldInclude = false;
                if (shouldInclude) {
                    const newId = Date.now() + Math.random() * 10000;
                    gameState.characters.push({ name, gender, type, desc, favor, avatar: "◇", isMain, id: newId });
                    if (isMain) gameState.mainCharacterIds.push(newId);
                    added = true;
                }
            } else {
                const existing = gameState.characters.find(c=>c.name===name);
                if (existing && existing.favor < favor) existing.favor = favor;
                added = true;
            }
        }
        if (added) updateUI();
        return text.replace(/<!--[\s\S]*?-->/g, '');
    }
    
    function containsForbiddenPersonalityPattern(text, personality) {
        if (!personality || personality === "" || personality === "随机") return false;
        const keywords = personality.split(/[，,、]/).map(k => k.trim()).filter(k => k.length > 0);
        const forbiddenPatterns = [
            new RegExp(`[她他你]${keywords[0] || personality}的性子`, 'i'),
            new RegExp(`${keywords[0] || personality}的性格`, 'i'),
            new RegExp(`性格${keywords[0] || personality}`, 'i'),
            new RegExp(`性子${keywords[0] || personality}`, 'i')
        ];
        for (let pattern of forbiddenPatterns) {
            if (pattern.test(text)) return true;
        }
        return false;
    }

            if (abortController) abortController.abort();

    async function regenerate(id) {
        const elem = gameState.narrativeElements.find(e=>e.id===id);
        if(!elem||!elem.userMessage) return;
        if(isLoading) return;
        isLoading=true;
        currentAbortController = new AbortController();
        const ph = showGeneratingPlaceholderWithCancel(currentAbortController);
        deleteMsg(id, true);
        try {
            const newResp = await callAI([{role:"user", content:elem.userMessage}], currentAbortController.signal);
            hideGeneratingPlaceholder();
            addMessage(newResp, elem.userMessage);
            renderOptions(newResp);
        } catch(e) { 
            if (e.name !== 'AbortError') {
                hideGeneratingPlaceholder(); 
                alert(`重新生成失败: ${e.message}`);
            } else {
                hideGeneratingPlaceholder();
            }
        }
        isLoading=false;
        currentAbortController = null;
    }
    
    async function editMsg(id) {
        const elem = gameState.narrativeElements.find(e=>e.id===id);
        if(!elem) return;
        const newTxt = prompt("编辑剧情", elem.content);
        if(newTxt) {
            elem.content = newTxt;
            elem.messageBlock.querySelector(".message-content").innerHTML = newTxt.replace(/\n/g,'<br>');
            parseHiddenCharacterInfo(newTxt);
            renderOptions(newTxt);
            autoSave();
        }
    }
    
    function deleteMsg(id, skipAutoSave=false) {
        const idx = gameState.narrativeElements.findIndex(e=>e.id===id);
        if(idx===-1) return;
        const e = gameState.narrativeElements[idx];
        if(e.timerInterval) clearInterval(e.timerInterval);
        if(e.messageBlock && e.messageBlock.parentNode) e.messageBlock.remove();
        gameState.narrativeElements.splice(idx,1);
        rebuildHistory();
        if (!skipAutoSave) autoSave();
    }
    
    function rebuildHistory() {
        gameState.conversationHistory = [];
        gameState.history = [];
        for(let e of gameState.narrativeElements) {
            if(e.userMessage && !e.userMessage.startsWith(">") && !e.isChoiceResult) {
                gameState.conversationHistory.push({role:"user", content:e.userMessage}, {role:"assistant", content:e.content});
                gameState.history.push(e.content);
            } else if(e.userMessage && e.userMessage.startsWith(">")) gameState.history.push(`> ${e.content}`);
        }
    }

    function renderOptions(text){

        for(let l of lines){ const m=l.match(/^\s*([A-Za-z0-9]+)[\.、]\s*(.+)/); if(m)opts.push({code:m[1],text:m[2]}); }
        if(opts.length===0){c.innerHTML="<span>⌇ 无选项，可自由输入</span>";return;}
        const sel=document.createElement("select");
        sel.style.maxWidth = "100%";
        sel.style.wordWrap = "break-word";
        opts.forEach(o=>{
            let opt=document.createElement("option");
            opt.value=o.code;
            opt.textContent=`${o.code}. ${o.text}`;
            opt.style.whiteSpace = "normal";

            opt.style.padding = "0.3rem";
            sel.appendChild(opt);
        });
        const btn=document.createElement("button"); btn.textContent="▷ 执行选项"; btn.onclick=()=>handleUserCmd(sel.value);
        c.appendChild(sel); c.appendChild(btn);

    async function handleUserCmd(cmd){
        if(gameState.isWorldEnded){alert("本周目已结束");return;}
        if(!cmd.trim()||isLoading)return;
        isLoading=true;
        currentAbortController = new AbortController();
        showGeneratingPlaceholderWithCancel(currentAbortController);
        
        const selectEl = document.querySelector("#optionsContainer select");
        let choiceText = "";
        if (selectEl) {
            const selectedOption = selectEl.options[selectEl.selectedIndex];
            if (selectedOption) choiceText = selectedOption.textContent;
        }
        addChoiceResult(cmd, choiceText.replace(/^[A-Za-z0-9]+\.\s*/, ''));
        
        const currentTimeStr = formatGameTime();
        const optionsHint = getOptionsStructureInstr();
        let userMsg=`玩家选择了选项：${cmd}。当前时间：${currentTimeStr}。请根据指令推进剧情，保持连贯，输出1200-1800字正文。
${optionsHint}`;
        try{
            let resp=await callAI([{role:"user", content:userMsg}], currentAbortController.signal);
            
            const jumpDays = parseTimeJump(resp);
            if (jumpDays > 0) {
                advanceGameTime(gameState.turnUnit, jumpDays);
                updateRoundHeaderTime();
                resp = resp.replace(/【时间跳跃:\d+天】/g, '');
            }
            
            resp = updateNSFWStateFromText(resp);
            
            // 选项结构验证和自动重试
            const expectedMode = getExpectedOptionMode();
            if (!validateOptionsStructure(resp, expectedMode) && retryCount < 1) {
                retryCount++;
                hideGeneratingPlaceholder();
                showGeneratingPlaceholderWithCancel(currentAbortController);
                const retryMsg = userMsg + `\n\n【重要提醒】上一轮回复中的选项不符合要求的格式。请严格按照格式输出4个选项：
${optionsHint}`;
                resp = await callAI([{role:"user", content:retryMsg}], currentAbortController.signal);
                retryCount = 0;
            }
            
            if (containsForbiddenPersonalityPattern(resp, gameState.heroine.personality) && retryCount < 1) {
                retryCount++;
                hideGeneratingPlaceholder();
                showGeneratingPlaceholderWithCancel(currentAbortController);
                const retryMsg = userMsg + "\n\n【重要提醒】上一轮回复中出现了禁止的直接性格描述，请避免。";
                resp = await callAI([{role:"user", content:retryMsg}], currentAbortController.signal);
                retryCount = 0;
            }
            
            hideGeneratingPlaceholder();
            addMessage(resp, userMsg);
            updateUI();
        }catch(e){ 
            if (e.name !== 'AbortError') {
                hideGeneratingPlaceholder(); 
                alert(`指令错误: ${e.message}`);
            } else {
                hideGeneratingPlaceholder();
            }
        }
        isLoading=false;
        currentAbortController = null;
    }

    function loadFromSlot(idx){

        try{

            gameState=JSON.parse(JSON.stringify(d.gameState));
            if (d.gameTime) {

                updateRoundHeaderTime();

    async function generateWorldSummary(){
        if(!apiSettings.key){alert("请先配置API");return;}
        let full=gameState.history.join("\n");
        if(!full.trim()){document.getElementById("summaryContent").innerHTML="无内容";return;}
        const mainChars=gameState.characters.filter(c=>gameState.mainCharacterIds.includes(c.id));
        const prompt=`请为以下快穿游戏周目生成一篇详细的总结（500-800字），包括：1.重要剧情回顾 2.玩家的经历与成长 3.玩家与各角色的羁绊发展（${mainChars.map(c=>c.name).join('、')}） 4.周目的最终结局氛围。世界观：${gameState.world}。`;
        try{
            const resp=await callAIForSummary(prompt);
            document.getElementById("summaryContent").innerHTML=resp.replace(/\n/g,'<br>');
        }catch(e){alert(`总结失败:${e.message}`);}
    }
    
    async function callAIForSummary(prompt){
        if(!apiSettings.key)throw new Error("未配置API");
        const payload={model:apiSettings.model,messages:[{role:"user",content:prompt}],temperature:0.6,max_tokens:1500};
        const resp=await fetch(apiSettings.url,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiSettings.key}`},body:JSON.stringify(payload)});
        if(!resp.ok)throw new Error(`API ${resp.status}`);
        const data=await resp.json();
        return data.choices[0].message.content;
    }

    async function fetchModels(){
        const url=document.getElementById("apiUrl").value;
        const key=document.getElementById("apiKey").value;
        if(!key){alert("请填写API Key");return;}
        const baseUrl=url.replace(/\/chat\/completions.*$/,'').replace(/\/$/,'');

        try{
            const resp=await fetch(modelsUrl,{headers:{"Authorization":`Bearer ${key}`}});
            if(!resp.ok)throw new Error(`HTTP ${resp.status}`);
            const data=await resp.json();

            'theme-blackwhite', 'theme-morandi_blue', 'theme-burgundy', 
            'theme-morandi_apricot', 'theme-morandi_sage'
        );
        switch(theme) {
            case 'blackwhite':
                document.body.classList.add('theme-blackwhite');
                break;
            case 'morandi_blue':
                document.body.classList.add('theme-morandi_blue');
                break;
            case 'burgundy':
                document.body.classList.add('theme-burgundy');
                break;
            case 'morandi_apricot':
                document.body.classList.add('theme-morandi_apricot');
                break;
            case 'morandi_sage':
                document.body.classList.add('theme-morandi_sage');
                break;
            default:
                document.body.classList.add('theme-blackwhite');
        }
        if (isNight) {
            document.body.classList.add('night-mode');
        } else {
            document.body.classList.remove('night-mode');
        }
        localStorage.setItem("theme", theme);
        localStorage.setItem("night", isNight ? "night" : "day");
    }
    
    window.onload = () => {
        loadAutoSave();
        const savedTheme = localStorage.getItem("theme") || "blackwhite";
        const savedNight = localStorage.getItem("night") === "night";
        applyTheme(savedTheme, savedNight);
        document.getElementById("colorThemeSelect").value = savedTheme;
        document.getElementById("nightModeSelect").value = savedNight ? "night" : "day";
        document.getElementById("colorThemeSelect").onchange = () => applyTheme(document.getElementById("colorThemeSelect").value, document.getElementById("nightModeSelect").value === "night");
        document.getElementById("nightModeSelect").onchange = () => applyTheme(document.getElementById("colorThemeSelect").value, document.getElementById("nightModeSelect").value === "night");
        document.getElementById("nextRoundBtn").onclick = nextTurn;
        document.getElementById("initWorldBtn").onclick = () => document.getElementById("setupModal").style.display = "flex";
        document.getElementById("saveGameBtn").onclick = () => showSaveLoadModal(true);
        document.getElementById("loadGameBtn").onclick = () => showSaveLoadModal(false);
        document.getElementById("resetWorldBtn").onclick = resetGame;
        document.getElementById("summaryBtn").onclick = () => { document.getElementById("summaryModal").style.display = "flex"; generateWorldSummary(); };
        document.getElementById("endWorldBtn").onclick = () => alert("结束世界：请手动点击「初始化」开始新周目");
        document.getElementById("sendCmdBtn").onclick = () => { handleUserCmd(document.getElementById("userCommand").value); document.getElementById("userCommand").value = ""; };
        document.getElementById("saveApiBtn").onclick = () => { 
            apiSettings.url = document.getElementById("apiUrl").value; 
            apiSettings.key = document.getElementById("apiKey").value; 
            apiSettings.model = document.getElementById("modelSelect").value; 
            autoSave(); 
            alert("API配置已保存"); 
        };
        document.getElementById("fetchModelsBtn").onclick = fetchModels;
        document.getElementById("viewPanelBtn").onclick = () => updateUI();
        document.getElementById("testApiBtn").onclick = testAPIConnection;
        document.getElementById("saveSettingsBtn").onclick = saveSettings;
        document.getElementById("checkSettingsBtn").onclick = checkSettings;
        document.getElementById("cancelSetupBtn").onclick = () => document.getElementById("setupModal").style.display = "none";
        document.getElementById("confirmSetupBtn").onclick = async () => { 
            const setup = collectSetup(); 
            document.getElementById("setupModal").style.display = "none"; 
            await startNewWorld(setup); 
        };
        document.getElementById("closeModalBtn").onclick = () => document.getElementById("saveLoadModal").style.display = "none";
        document.getElementById("closeSummaryBtn").onclick = () => document.getElementById("summaryModal").style.display = "none";
        document.getElementById("downloadSummaryBtn").onclick = downloadSummary;
        window.onclick = (e) => { if(e.target.classList.contains("modal")) e.target.style.display = "none"; };
        if(!gameState.world) document.getElementById("setupModal").style.display = "flex";
    };
</script>
</body>
</html>
